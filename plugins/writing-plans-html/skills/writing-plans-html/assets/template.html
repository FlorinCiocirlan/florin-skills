<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>__PLAN_TITLE__</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📋</text></svg>">

<style>
  :root {
    --bg: #000000; --panel: #0d1117; --border: #262b33;
    --fg: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
    --code-bg: #282c34; --done: #3fb950;
    --max: 860px;
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0; background: var(--bg); color: var(--fg);
    font: 16px/1.65 -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    display: grid; grid-template-columns: 280px 1fr; min-height: 100vh;
  }
  nav {
    position: sticky; top: 0; align-self: start; height: 100vh; overflow-y: auto;
    border-right: 1px solid var(--border); background: var(--panel); padding: 24px 18px;
  }
  nav .brand { font-size: 12px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
  nav a { display: block; color: var(--muted); text-decoration: none; padding: 3px 0; font-size: 13.5px; border-left: 2px solid transparent; padding-left: 10px; margin-left: -10px; }
  nav a:hover { color: var(--fg); }
  nav a.h3 { padding-left: 22px; font-size: 12.5px; }
  nav a.active { color: var(--accent); border-left-color: var(--accent); }
  main { padding: 48px 56px 120px; max-width: calc(var(--max) + 112px); }
  article { max-width: var(--max); }
  h1, h2, h3, h4 { line-height: 1.25; scroll-margin-top: 24px; }
  h1 { font-size: 30px; margin: 0 0 8px; }
  h2 { font-size: 22px; margin: 40px 0 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  h3 { font-size: 18px; margin: 28px 0 8px; }
  a { color: var(--accent); }
  blockquote { margin: 16px 0; padding: 10px 16px; border-left: 3px solid var(--accent); background: var(--panel); border-radius: 0 6px 6px 0; color: var(--muted); }
  blockquote p { margin: 4px 0; }
  pre { background: var(--code-bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; overflow-x: auto; position: relative; }
  pre code { background: none; padding: 0; font-size: 13.5px; }
  code { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; font-size: 13.5px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  pre .copy { position: absolute; top: 8px; right: 8px; font-size: 11px; color: var(--muted); background: var(--bg); border: 1px solid var(--border); border-radius: 5px; padding: 3px 8px; cursor: pointer; opacity: 0; transition: opacity .15s; }
  pre:hover .copy { opacity: 1; }
  pre .copy:hover { color: var(--fg); }
  hr { border: none; border-top: 1px solid var(--border); margin: 36px 0; }
  table { border-collapse: collapse; width: 100%; margin: 16px 0; }
  th, td { border: 1px solid var(--border); padding: 7px 12px; text-align: left; }
  th { background: var(--panel); }
  ul.contains-task-list { list-style: none; padding-left: 4px; }
  ul.contains-task-list li.task-list-item { display: flex; align-items: flex-start; gap: 10px; padding: 3px 0; }
  li.task-list-item input[type=checkbox] { width: 17px; height: 17px; margin-top: 4px; cursor: pointer; accent-color: var(--done); flex-shrink: 0; }
  li.task-list-item.done { color: var(--muted); text-decoration: line-through; }
  li.task-list-item.done strong { color: var(--muted); }
  .progress { position: sticky; top: 0; z-index: 5; background: var(--bg); padding: 8px 0 16px; margin: -8px 0 8px; }
  .progress .bar { height: 6px; background: var(--panel); border-radius: 3px; overflow: hidden; border: 1px solid var(--border); }
  .progress .fill { height: 100%; background: var(--done); width: 0; transition: width .25s; }
  .progress .label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  /* atom-one-dark highlight.js theme (inlined below). Make it cover the pre padding too. */
  pre code.hljs { background: transparent; padding: 0; }
</style>
<style>__HLJS_CSS__</style>
</head>
<body>
<nav><div class="brand">Plan Outline</div><div id="toc"></div></nav>
<main>
  <div class="progress"><div class="label" id="prog-label">0 / 0 steps</div><div class="bar"><div class="fill" id="prog-fill"></div></div></div>
  <article id="content"></article>
</main>

<script id="plan-md" type="text/markdown">__PLAN_MARKDOWN__</script>
<script>__MARKED_JS__</script>
<script>__HLJS_JS__</script>
<script>
  // The server escapes "</script" -> "<\/script" so the embedded markdown can't
  // close its host <script>. Restore it before rendering.
  const raw = document.getElementById('plan-md').textContent.replace(/<\\\/script/g, '</script');
  const planKey = 'plan-html:' + (location.pathname || 'plan');
  marked.setOptions({ gfm: true, breaks: false });
  document.getElementById('content').innerHTML = marked.parse(raw);

  // --- Syntax highlight code blocks (atom-one-dark) ---
  if (window.hljs) {
    document.querySelectorAll('#content pre code').forEach(el => hljs.highlightElement(el));
  }

  // --- Build TOC from h2/h3 ---
  const toc = document.getElementById('toc');
  const heads = [...document.querySelectorAll('#content h2, #content h3')];
  const slug = (t, i) => (t.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') || 'sec') + '-' + i;
  heads.forEach((h, i) => {
    h.id = slug(h.textContent, i);
    const a = document.createElement('a');
    a.href = '#' + h.id; a.textContent = h.textContent; a.className = h.tagName.toLowerCase();
    toc.appendChild(a);
  });
  const tocLinks = [...toc.querySelectorAll('a')];
  const io = new IntersectionObserver(es => {
    es.forEach(e => { if (e.isIntersecting) {
      tocLinks.forEach(l => l.classList.toggle('active', l.getAttribute('href') === '#' + e.target.id));
    }});
  }, { rootMargin: '0px 0px -75% 0px' });
  heads.forEach(h => io.observe(h));

  // --- Copy buttons on code blocks ---
  document.querySelectorAll('pre').forEach(pre => {
    const btn = document.createElement('button');
    btn.className = 'copy'; btn.textContent = 'copy';
    btn.onclick = () => { navigator.clipboard.writeText(pre.querySelector('code')?.innerText ?? pre.innerText); btn.textContent = 'copied'; setTimeout(() => btn.textContent = 'copy', 1200); };
    pre.appendChild(btn);
  });

  // --- Interactive checkboxes with localStorage persistence ---
  // marked emits the <input> but not GitHub's task-list classes, so tag them
  // ourselves for styling and select by input rather than by class.
  const boxes = [...document.querySelectorAll('#content input[type=checkbox]')];
  boxes.forEach((b, i) => {
    b.dataset.idx = i; b.disabled = false;
    const li = b.closest('li'); if (li) li.classList.add('task-list-item');
    const ul = b.closest('ul'); if (ul) ul.classList.add('contains-task-list');
  });
  const saved = JSON.parse(localStorage.getItem(planKey) || '{}');
  const fill = document.getElementById('prog-fill'), label = document.getElementById('prog-label');
  function refresh() {
    boxes.forEach(b => { b.disabled = false; const li = b.closest('li'); li.classList.toggle('done', b.checked); });
    const done = boxes.filter(b => b.checked).length;
    if (boxes.length) { fill.style.width = (done / boxes.length * 100) + '%'; label.textContent = done + ' / ' + boxes.length + ' steps'; }
    else document.querySelector('.progress').style.display = 'none';
  }
  boxes.forEach(b => {
    b.checked = !!saved[b.dataset.idx];
    b.addEventListener('change', () => { saved[b.dataset.idx] = b.checked; localStorage.setItem(planKey, JSON.stringify(saved)); refresh(); });
  });
  refresh();
</script>
</body>
</html>
